version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: resumai-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-resumai}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-resumai123}
      MONGO_INITDB_DATABASE: resumai
    volumes:
      - mongodb_data:/data/db
    networks:
      - resumai-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resumai-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env
    environment:
      - MONGODB_URI=mongodb://resumai:resumai123@mongodb:27017/resumai?authSource=admin
    depends_on:
      - mongodb
    volumes:
      - resume_uploads:/app/uploads
    networks:
      - resumai-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
        - VITE_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: resumai-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - resumai-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongodb_data:
  resume_uploads:

networks:
  resumai-network:
    driver: bridge
